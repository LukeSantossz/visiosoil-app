name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          cache: true
      - run: flutter pub get
      - name: Generate Drift adapters
        run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The durable-numbering guard reads git history to detect a deleted
          # spec or ADR. A shallow clone would show none and pass vacuously.
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          cache: true
      - name: Install SQLite (for Drift in-memory tests)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0 libsqlite3-dev
      - run: flutter pub get
      - name: Generate Drift adapters
        run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test

  build:
    needs: [analyze, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          cache: true
      - run: flutter pub get
      - name: Generate Drift adapters
        run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
