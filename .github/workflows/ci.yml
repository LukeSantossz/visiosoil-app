name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          cache: true
      - run: flutter pub get
      - name: Generate Drift adapters
        run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The durable-numbering guard reads git history to detect a deleted
          # spec or ADR. A shallow clone would show none and pass vacuously.
          fetch-depth: 0
          # The steps below run repository-controlled code (build_runner, tests)
          # and need no GitHub credentials, so do not leave a token in .git.
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          cache: true
      - name: Install SQLite (for Drift in-memory tests)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0 libsqlite3-dev
      - run: flutter pub get
      - name: Generate Drift adapters
        run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test

  build:
    needs: [analyze, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          cache: true
      - run: flutter pub get
      - name: Generate Drift adapters
        run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release
      - name: Verify R8 kept the auth classes in the release APK
        run: |
          set -euo pipefail
          apk=build/app/outputs/flutter-apk/app-release.apk
          tmp=$(mktemp -d)
          unzip -o -q "$apk" 'classes*.dex' -d "$tmp"
          sdk="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          dexdump="$(find "$sdk/build-tools" -name dexdump -type f | sort -V | tail -1)"
          # dexdump prints "Class descriptor  : 'L...;'" only for classes DEFINED
          # in the DEX, so this asserts the auth classes survived R8 rather than
          # merely being referenced somewhere in the string pool.
          defs="$(for d in "$tmp"/classes*.dex; do "$dexdump" "$d"; done | grep 'Class descriptor' || true)"
          # Use a here-string, not a pipe: `grep -q` exits on the first match and
          # would SIGPIPE the writer, which under `pipefail` flips a found class
          # into a false "stripped" failure on a large DEX.
          if ! grep -q "Lcom/google/crypto/tink/" <<< "$defs"; then
            echo "::error::R8 stripped the Tink class definitions from the release APK"
            exit 1
          fi
          if ! grep -q "Lcom/google/android/gms/auth/" <<< "$defs"; then
            echo "::error::R8 stripped the Google Play Services auth class definitions from the release APK"
            exit 1
          fi
          echo "Auth classes defined in the release DEX."
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  smoke:
    # Boot the minified release APK on an emulator so R8 regressions that only
    # surface at runtime (issue #69, problem 2) fail the pipeline. The DEX check
    # in `build` guards that the auth classes survived R8; this proves the release
    # build actually starts.
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: apk
      - name: Boot smoke on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: default
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          # android-emulator-runner runs each line as a separate `sh -c`, so a
          # variable cannot span lines and every construct stays on one line. The
          # last line captures the PID, checks the process is alive (a crash that
          # kills it), and scopes the crash scan to that PID (so an unrelated system
          # process cannot false-fail the job) — all in one shell. It catches
          # native/Java crashes AND Dart-side failures (Flutter logs an uncaught
          # error under E/flutter as "Unhandled Exception" or "EXCEPTION CAUGHT BY").
          script: |
            adb install -r apk/app-release.apk
            adb logcat -c
            adb shell monkey -p com.visiosoil.visiosoil_app -c android.intent.category.LAUNCHER 1
            sleep 25
            if pid=$(adb shell pidof com.visiosoil.visiosoil_app | tr -d '[:space:]'); [ -n "$pid" ]; then adb logcat -d --pid="$pid" | grep -E "FATAL EXCEPTION|E AndroidRuntime|Unhandled Exception|EXCEPTION CAUGHT BY" && { echo "::error::App logged a fatal error on startup"; exit 1; }; echo "Boot smoke passed."; else echo "::error::App process not running after launch (crashed on startup)"; exit 1; fi

  build-ios:
    # Compile the real iOS target so an iOS-only platform-config break (e.g. the
    # missing reversed-client-id URL scheme fixed in #66) fails the pipeline
    # instead of merging green. macos-latest is the only runner that can run
    # xcodebuild; --no-codesign exercises the Xcode/Info.plist build without
    # needing signing certificates or provisioning profiles.
    needs: [analyze, test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          cache: true
      - run: flutter pub get
      - name: Generate Drift adapters
        run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --release --no-codesign
